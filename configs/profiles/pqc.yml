name: pqc
description: "Maximum-supported post-quantum TLS profile with ML-KEM key exchange"
tls_version: "TLSv1.3"
library: "openssl-3.5"
key_exchange_group: "MLKEM768"
signature_algorithm: "ecdsa"

certificate:
  key_type: "ec"
  curve: "prime256v1"

expected:
  group: "MLKEM768"
  pqc: true
  hybrid: false

test:
  repeats: 30
  timeout_seconds: 10

limitations:
  profile_type: "maximum-supported-pqc"
  key_exchange: "Post-quantum ML-KEM key exchange is required."
  certificate_signature: "Classical ECDSA certificate is used at this stage for TLS/X.509 stability."
  note: "Full PQC certificate support with ML-DSA/SLH-DSA can be added as an extension after the base pipeline is stable."